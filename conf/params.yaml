# Symbolliste
SYMBOLS_PATH: "data/nasdaq100_symbols.csv"

# Step 01 - Data Acquisition
DATA_ACQUISITION:
  DATA_PATH:    "data/raw/Bars_1m_adj"
  START_DATE:   "2022-01-01"
  END_DATE:     "2025-01-01"
  TIMEFRAME:    "1Min"
  SYMBOLS_PATH: "data/nasdaq100_symbols.csv"

# Step 03 - Pre-Split Data Preparation
DATA_PREP:
  HORIZON: 30
  THETA:   0.003
  EMA_PERIODS:   [5, 10, 20, 60, 120, 240]
  SLOPE_PERIODS: [1, 3, 5]
  Z_NORM_WINDOW: 1200
  PROCESSED_PATH: "data/processed/pre_split/"
  TRAIN_DATE:      "2023-12-31"
  VALIDATION_DATE: "2024-06-30"
  TEST_DATE:       "2025-01-01"

# Step 04 - Split Data (Shuffle + Global Sharding)
SPLIT_DATA:
  N_SHARDS: 100
  SHUFFLED_PATH: "data/processed/shuffled/"

# Step 05 - Post-Split Data Preparation
POST_SPLIT:
  SCALER_PATH: "data/processed/global_scaler.pkl"
  BALANCE_PATH: "data/processed/class_balance.json"

# Test-Modus: nur erste N Symbole verarbeiten (null = alle)
SUBSET_SYMBOLS: null
